# /etc/nginx/conf.d/airflow.conf
upstream airflow_web {
    server airflow-apiserver:8080;
    keepalive 64;
}

# If you are terminating TLS elsewhere (like Cloudflare),
# you can keep only port 80 and remove the 443 blocks.

server {
    listen 80;
    listen [::]:80;
    server_name datapipelines.afyaanalytics.com;
    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        try_files $uri =404;
    }

    location / {
       return 301 https://$host$request_uri;
    }
}

server {
    listen 80;
    listen [::]:80;
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name datapipelines.afyaanalytics.com;

    

    charset utf-8;
    client_max_body_size 100M;

    ssl_certificate /etc/letsencrypt/live/datapipelines.afyaanalytics.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/datapipelines.afyaanalytics.com/privkey.pem;
    
    
    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        try_files $uri =404;
    }

    
    # Main proxy
    location / {
        proxy_pass http://airflow_web;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

   

}